services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ta_report_e2e
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ta_report_e2e"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/ta_report_e2e
      SESSION_SECRET_KEY: e2e-test-secret-change-me
      SESSION_COOKIE_INSECURE: "1"
      ALLOWED_HD: symphony.is
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      GOOGLE_OAUTH_CLIENT_ID: not-used-in-e2e
      GOOGLE_OAUTH_CLIENT_SECRET: not-used-in-e2e
      GOOGLE_OAUTH_REDIRECT_URI: http://localhost:8000/api/auth/callback
      # No GOOGLE_SERVICE_ACCOUNT_JSON_PATH: Sheet calls are mocked at the network layer.
      SPREADSHEET_ID: not-used-in-e2e
      SPREADSHEET_TAB_NAME: Report Template
      LOG_LEVEL: WARNING
    ports:
      - "8001:8000"
    command: >
      sh -c "
        uv run alembic upgrade head &&
        uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  frontend:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      - backend
    command: sh -c "npm install && npm run preview -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-e2e-node-modules:/app/node_modules

volumes:
  frontend-e2e-node-modules:
