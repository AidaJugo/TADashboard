name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint, type, test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ta_report
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ta_report
      SESSION_SECRET_KEY: ci-only-not-a-real-secret
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: uv sync
      - name: Ruff
        working-directory: backend
        run: uv run ruff check .
      - name: Black
        working-directory: backend
        run: uv run black --check .
      - name: Mypy
        working-directory: backend
        run: uv run mypy app
      - name: Pytest (unit + integration)
        working-directory: backend
        run: uv run pytest -m "unit or integration" --cov=app --cov-report=xml
      - name: pip-audit
        working-directory: backend
        run: uv run pip-audit --strict
        continue-on-error: true

  frontend:
    name: frontend (lint, type, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci || npm install
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Format check
        working-directory: frontend
        run: npm run format
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Unit tests
        working-directory: frontend
        run: npm run test
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: npm audit (high+)
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  e2e:
    name: e2e (Playwright smoke)
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci || npm install
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Start preview
        working-directory: frontend
        run: |
          npx vite preview --host 0.0.0.0 --port 5173 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173/ > /dev/null && break
            sleep 1
          done
      - name: Run Playwright
        working-directory: frontend
        env:
          CI: "true"
          E2E_BASE_URL: http://localhost:5173
        run: npx playwright test
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14

  security:
    name: security (gitleaks, semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/owasp-top-ten p/secrets p/python p/typescript p/react"
        continue-on-error: true
