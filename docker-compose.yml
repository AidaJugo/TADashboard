services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ta_report
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Three-role grant bootstrap (ADR 0010).  Runs only on first container
      # creation.  If postgres-data already exists, destroy the volume and
      # restart: `docker compose down -v && docker compose up`.
      - ./backend/grants.sql:/docker-entrypoint-initdb.d/01_grants.sql:ro
      - ./backend/init-db.sh:/docker-entrypoint-initdb.d/02_init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ta_report"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/ta_report
      # Three-role connections (ADR 0010) — dev passwords set by init-db.sh.
      DATABASE_URL_ERASURE: postgresql+psycopg://ta_report_erasure:ta_report_erasure_dev@db:5432/ta_report
      DATABASE_URL_SWEEP: postgresql+psycopg://ta_report_sweep:ta_report_sweep_dev@db:5432/ta_report
      SESSION_SECRET_KEY: dev-only-change-me
      ALLOWED_HD: symphony.is
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: http://localhost:8000/auth/callback
      GOOGLE_SERVICE_ACCOUNT_JSON_PATH: /run/secrets/service_account.json
      SPREADSHEET_ID: ${SPREADSHEET_ID:-}
      SPREADSHEET_TAB_NAME: ${SPREADSHEET_TAB_NAME:-Report Template}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./secrets:/run/secrets:ro

  frontend:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

volumes:
  postgres-data:
  frontend-node-modules:
